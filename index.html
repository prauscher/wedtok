<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>WedTok</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<nav id="tabs">
	<button data-mode="all" class="active">For You</button>
	<button data-mode="liked">Liked</button>
</nav>
<main id="feed"></main>

<template id="slide-tpl">
	<section class="slide">
		<video loop playsinline preload="metadata"></video>
		<div class="overlay">
			<div class="meta">
				<div class="author"></div>
				<div class="caption"></div>
			</div>
			<div class="actions">
				<button class="like" aria-pressed="false">
					<svg class="heart" viewBox="0 0 32 32" aria-hidden="true">
						<path d="M16 28s-11-7.2-11-15.2C5 8.6 8.1 6 11.5 6c2.2 0 3.7 1.1 4.5 2.4C16.8 7.1 18.3 6 20.5 6 23.9 6 27 8.6 27 12.8 27 20.8 16 28 16 28z"/>
					</svg>
				</button>
			</div>
			<div class="mute-hint">tap to unmute</div>
		</div>
		<div class="progress"><div class="progress-fill"></div></div>
	</section>
</template>

<template id="empty-tpl">
	<section class="slide empty"></section>
</template>

<template id="burst-tpl">
	<svg class="burst" viewBox="0 0 32 32" aria-hidden="true">
		<path fill="currentColor" d="M16 28s-11-7.2-11-15.2C5 8.6 8.1 6 11.5 6c2.2 0 3.7 1.1 4.5 2.4C16.8 7.1 18.3 6 20.5 6 23.9 6 27 8.6 27 12.8 27 20.8 16 28 16 28z"/>
	</svg>
</template>

<script type="module" src="assets/app.js"></script>
</body>
</html>
